<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>1648 HQ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}

/* ===== オープニング ===== */
#opening{
  position:fixed;inset:0;z-index:100;background:#000;
  display:flex;align-items:center;justify-content:center;
}
#opening video{
  width:100%;height:100%;object-fit:cover;
}
#opening.fade-out{
  animation:fadeOut .8s ease forwards;
}
@keyframes fadeOut{
  from{opacity:1}
  to{opacity:0;pointer-events:none}
}

/* ===== メインHQ ===== */
#hq{
  position:fixed;inset:0;z-index:1;opacity:0;transition:opacity .8s ease;
}
#hq.visible{opacity:1}

/* 背景動画 */
#bgVideo{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  z-index:0;
}

/* タップエリア */
.tap-area{
  position:absolute;
  z-index:10;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  /* デバッグ用：確認後にborderを外す */
  /* border:2px solid rgba(255,255,0,.5); */
}
.tap-area::after{
  content:"";
  position:absolute;inset:0;
  background:rgba(255,255,255,0);
  border-radius:8px;
  transition:background .15s;
}
.tap-area:active::after{
  background:rgba(255,255,255,.15);
}

/* 突撃くん */
#link-attack{
  left:0%;top:12%;
  width:42%;height:9%;
}

/* T12 promoter */
#link-t12{
  left:0%;top:21%;
  width:44%;height:9%;
}

/* 官職予約EXPRESSボタン */
#btn-yoyaku{
  position:fixed;
  right:12px;
  bottom:24px;
  z-index:50;
  background:linear-gradient(135deg,#1a4a9e,#0d2d6e);
  border:2px solid #3b82f6;
  border-radius:14px;
  padding:10px 16px;
  color:#fff;
  font-family:'Hiragino Sans','Yu Gothic',sans-serif;
  font-size:13px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(59,130,246,.5);
  display:flex;
  align-items:center;
  gap:8px;
  -webkit-tap-highlight-color:transparent;
  letter-spacing:.5px;
}
#btn-yoyaku:active{
  transform:scale(.95);
  box-shadow:0 2px 10px rgba(59,130,246,.4);
}
#btn-yoyaku .yoyaku-icon{
  font-size:18px;
}
#btn-yoyaku .yoyaku-text{
  display:flex;
  flex-direction:column;
  line-height:1.3;
}
#btn-yoyaku .yoyaku-main{
  font-size:13px;
}
#btn-yoyaku .yoyaku-sub{
  font-size:9px;
  color:#93c5fd;
  font-weight:600;
}

/* タップリップル */
.ripple{
  position:fixed;
  width:60px;height:60px;
  border-radius:50%;
  background:rgba(255,255,255,.3);
  transform:translate(-50%,-50%) scale(0);
  animation:ripple .5s ease-out forwards;
  pointer-events:none;
  z-index:200;
}
@keyframes ripple{
  to{transform:translate(-50%,-50%) scale(4);opacity:0}
}

/* ===== リンクボタングループ ===== */
#link-buttons{
  position:fixed;
  top:24px;
  left:50%;
  transform:translateX(-50%);
  z-index:50;
  display:flex;
  flex-direction:column;
  gap:10px;
  width:calc(100% - 32px);
  max-width:360px;
}
.link-btn{
  width:100%;
  height:52px;
  border-radius:14px;
  border:none;
  display:flex;
  align-items:center;
  gap:12px;
  padding:0 16px;
  cursor:pointer;
  font-family:'Hiragino Sans','Yu Gothic',sans-serif;
  font-weight:900;
  font-size:14px;
  letter-spacing:.5px;
  -webkit-tap-highlight-color:transparent;
  transition:transform .1s,box-shadow .1s;
}
.link-btn:active{transform:scale(.97);}
.link-btn-attack{
  background:linear-gradient(135deg,rgba(26,74,158,.92),rgba(13,45,110,.92));
  border:2px solid #3b82f6;
  color:#fff;
  box-shadow:0 4px 20px rgba(59,130,246,.4);
}
.link-btn-t12{
  background:linear-gradient(135deg,rgba(146,64,14,.92),rgba(107,48,8,.92));
  border:2px solid #f59e0b;
  color:#fde68a;
  box-shadow:0 4px 20px rgba(245,158,11,.4);
}
.link-btn-yoyaku{
  background:linear-gradient(135deg,rgba(22,101,52,.92),rgba(15,70,35,.92));
  border:2px solid #22c55e;
  color:#86efac;
  box-shadow:0 4px 20px rgba(34,197,94,.4);
}
.link-btn-icon{width:36px;height:36px;flex-shrink:0;object-fit:contain;}
.link-btn-text{display:flex;flex-direction:column;line-height:1.3;text-align:left;}
.link-btn-main{font-size:14px;}
.link-btn-sub{font-size:9px;opacity:.75;font-weight:600;}

/* ===== 官職予約モーションオーバーレイ ===== */
#yoyakuOpening{
  display:none;
  position:fixed;inset:0;z-index:200;background:#000;
  align-items:center;justify-content:center;
}
#yoyakuOpening.open{display:flex;}
#yoyakuOpening video{
  width:100%;height:100%;object-fit:cover;
}
#yoyakuOpening.fade-out{
  animation:fadeOut .6s ease forwards;
}
</style>
</head>
<body>

<!-- 官職予約モーションオーバーレイ -->
<div id="yoyakuOpening">
  <video id="yoyakuVideo" playsinline muted>
    <source src="yoyaku_opening.mp4" type="video/mp4">
  </video>
</div>

<!-- オープニング（3秒） -->
<div id="opening">
  <video id="openingVideo" playsinline autoplay muted>
    <source src="opening.mp4" type="video/mp4">
  </video>
</div>

<!-- メインHQ -->
<div id="hq">
  <video id="bgVideo" playsinline autoplay muted loop>
    <source src="bg.mp4" type="video/mp4">
  </video>

  <!-- タップエリア：突撃くん -->
  <div class="tap-area" id="link-attack"
    data-url="https://kekj12kek-sudo.github.io/frost-dragon-app/frost_app.html">
  </div>

  <!-- タップエリア：T12 promoter -->
  <div class="tap-area" id="link-t12"
    data-url="https://kekj12kek-sudo.github.io/wos-alliance-tools/index.html">
  </div>
</div>

<!-- リンクボタングループ -->
<div id="link-buttons">
  <button class="link-btn link-btn-attack" onclick="goLink('https://kekj12kek-sudo.github.io/frost-dragon-app/frost_app.html', this)">
    <img class="link-btn-icon" src="usagi.png" alt="突撃くん">
    <span class="link-btn-text">
      <span class="link-btn-main">突撃くん</span>
      <span class="link-btn-sub">SVS・霜竜 同時着弾管理</span>
    </span>
  </button>
  <button class="link-btn link-btn-t12" onclick="goLink('https://kekj12kek-sudo.github.io/wos-alliance-tools/index.html', this)">
    <img class="link-btn-icon" src="T12.png" alt="T12 Planner">
    <span class="link-btn-text">
      <span class="link-btn-main">T12 Planner</span>
      <span class="link-btn-sub">T12研究コスト計算</span>
    </span>
  </button>
  <button class="link-btn link-btn-yoyaku" onclick="goYoyaku(this)">
    <img class="link-btn-icon" src="EXPRESS.png" alt="官職予約 EXPRESS">
    <span class="link-btn-text">
      <span class="link-btn-main">官職予約 EXPRESS</span>
      <span class="link-btn-sub">官職予約アンケート</span>
    </span>
  </button>
</div>

<script>
// ===== オープニング → HQ切り替え =====
const openingEl  = document.getElementById("opening");
const hqEl       = document.getElementById("hq");
const openingVid = document.getElementById("openingVideo");

function showHQ(){
  openingEl.classList.add("fade-out");
  hqEl.classList.add("visible");
  setTimeout(()=>{ openingEl.style.display="none"; }, 800);
}

// 3秒後に自動切り替え
let switched = false;
function doSwitch(){
  if(switched) return;
  switched = true;
  showHQ();
}

setTimeout(doSwitch, 3000);

// 動画終了時にも切り替え（念のため）
openingVid.addEventListener("ended", doSwitch);

// 動画再生できない場合のフォールバック
openingVid.addEventListener("error", doSwitch);

// ===== リンクボタン共通遷移 =====
function goLink(url, btn){
  addRippleToBtn(btn);
  setTimeout(()=>{ location.href = url; }, 250);
}

// ===== 官職予約：モーション→遷移 =====
function goYoyaku(btn){
  addRippleToBtn(btn);
  const ov  = document.getElementById('yoyakuOpening');
  const vid = document.getElementById('yoyakuVideo');
  ov.classList.add('open');
  vid.currentTime = 0;
  vid.play().catch(()=>{});
  // 動画終了 or 3.5秒後に遷移
  let gone = false;
  function go(){
    if(gone) return; gone = true;
    // HQコンテンツを即座に非表示
    document.getElementById('hq').style.display = 'none';
    ov.classList.add('fade-out');
    setTimeout(()=>{ location.href = "https://kekj12kek-sudo.github.io/1648-yoyaku/"; }, 600);
  }
  vid.onended = go;
  setTimeout(go, 3500);
}

function addRippleToBtn(btn){
  if(!btn) return;
  const rect = btn.getBoundingClientRect();
  const ripple = document.createElement("div");
  ripple.className = "ripple";
  ripple.style.left = (rect.left + rect.width/2) + "px";
  ripple.style.top  = (rect.top  + rect.height/2) + "px";
  document.body.appendChild(ripple);
  setTimeout(()=>ripple.remove(), 500);
}

// ===== タップエリア（動画内テキスト用・非表示でも残す） =====
// タップエリア（動画に文言がある場合のフォールバック）
document.querySelectorAll('.tap-area').forEach(el=>{
  el.addEventListener('click', e=>{
    const url = el.dataset.url;
    if(url) goLink(url, null);
  });
});
</script>
</body>
</html>
